<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Every Second on Earth — by Sayan</title>
<meta name="author" content="Sayan">
<meta name="description" content="Real-time live statistics of what's happening on Earth every second. Built by Sayan.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8; --ink: #1a1410; --ink2: #3d3228; --muted: #9a8d7e;
  --muted2: #c4b9aa; --border: #e2d9cc; --birth: #2d6a4f; --death: #c1440e;
  --nature: #4a7c59; --human: #1d3557; --climate: #e76f51; --space: #6b4226;
  --card: #faf7f2;
  --font-display: 'Playfair Display', serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'Manrope', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 100; opacity: 0.4; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px 100px; }
.hero { padding: 80px 0 60px; border-bottom: 1px solid var(--border); margin-bottom: 60px; display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 40px; }
.hero-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.live-dot { width: 8px; height: 8px; background: #e63946; border-radius: 50%; animation: pulse-dot 1.5s infinite; flex-shrink: 0; }
@keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1;box-shadow:0 0 0 0 rgba(230,57,70,0.4)} 50%{transform:scale(1.2);opacity:0.8;box-shadow:0 0 0 6px rgba(230,57,70,0)} }
.hero-title { font-family: var(--font-display); font-size: clamp(48px, 8vw, 96px); line-height: 0.95; font-weight: 900; letter-spacing: -2px; margin-bottom: 24px; opacity: 0; animation: fadeUp 0.8s 0.1s cubic-bezier(.16,1,.3,1) forwards; }
.hero-title em { font-style: italic; color: var(--muted); font-weight: 400; }
.hero-sub { font-size: 16px; color: var(--muted); font-weight: 300; line-height: 1.7; max-width: 480px; opacity: 0; animation: fadeUp 0.8s 0.2s cubic-bezier(.16,1,.3,1) forwards; }
.hero-right { text-align: right; opacity: 0; animation: fadeUp 0.8s 0.3s cubic-bezier(.16,1,.3,1) forwards; }
.hero-timer-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.hero-timer { font-family: var(--font-mono); font-size: 48px; font-weight: 600; color: var(--ink); letter-spacing: -1px; line-height: 1; }
.hero-timer span { color: var(--muted2); font-weight: 300; }
.since-bar { background: var(--ink); color: var(--bg); border-radius: 16px; padding: 20px 28px; margin-bottom: 60px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.8s 0.4s cubic-bezier(.16,1,.3,1) forwards; }
.since-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 3px; color: var(--muted2); text-transform: uppercase; flex-shrink: 0; }
.since-stats { display: flex; gap: 32px; flex-wrap: wrap; flex: 1; }
.since-val { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: #fff; line-height: 1; }
.since-stat-label { font-size: 11px; color: var(--muted2); margin-top: 3px; font-family: var(--font-mono); letter-spacing: 1px; }
.section-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.section-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.section-desc { font-size: 13px; color: var(--muted); font-weight: 300; }
.section-wrap { margin-bottom: 64px; opacity: 0; animation: fadeUp 0.8s cubic-bezier(.16,1,.3,1) forwards; }
.section-wrap:nth-child(1){animation-delay:0.5s} .section-wrap:nth-child(2){animation-delay:0.6s} .section-wrap:nth-child(3){animation-delay:0.7s} .section-wrap:nth-child(4){animation-delay:0.8s} .section-wrap:nth-child(5){animation-delay:0.9s}
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(26,20,16,0.08); }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 99px; }
.stat-card.birth::before{background:var(--birth)} .stat-card.death::before{background:var(--death)} .stat-card.nature::before{background:var(--nature)} .stat-card.human::before{background:var(--human)} .stat-card.climate::before{background:var(--climate)} .stat-card.space::before{background:var(--space)}
.stat-emoji { font-size: 24px; margin-bottom: 14px; display: block; line-height: 1; }
.stat-number { font-family: var(--font-mono); font-size: 36px; font-weight: 600; line-height: 1; margin-bottom: 6px; letter-spacing: -1px; transition: color 0.3s; }
.stat-card.birth .stat-number{color:var(--birth)} .stat-card.death .stat-number{color:var(--death)} .stat-card.nature .stat-number{color:var(--nature)} .stat-card.human .stat-number{color:var(--human)} .stat-card.climate .stat-number{color:var(--climate)} .stat-card.space .stat-number{color:var(--space)}
.stat-label { font-size: 13px; font-weight: 600; color: var(--ink2); margin-bottom: 4px; }
.stat-sub { font-size: 11px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.5px; }
.per-sec { display: inline-flex; align-items: center; gap: 5px; background: rgba(26,20,16,0.05); border-radius: 99px; padding: 3px 10px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 10px; letter-spacing: 1px; }
.per-sec-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: blink2 1s infinite; }
@keyframes blink2 { 0%,100%{opacity:1} 50%{opacity:0.2} }
.big-counter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.big-counter { background: var(--ink); border-radius: 16px; padding: 28px; color: white; position: relative; overflow: hidden; }
.big-counter::after { content: attr(data-emoji); position: absolute; right: 20px; bottom: 16px; font-size: 64px; opacity: 0.08; line-height: 1; pointer-events: none; }
.big-counter-val { font-family: var(--font-mono); font-size: clamp(28px, 4vw, 48px); font-weight: 600; letter-spacing: -1px; line-height: 1; margin-bottom: 8px; color: #fff; }
.big-counter-label { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 300; letter-spacing: 0.5px; }
.big-counter-sub { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 8px; letter-spacing: 1px; }
.ticker-wrap { background: var(--ink); border-radius: 12px; padding: 16px 24px; margin-bottom: 64px; overflow: hidden; opacity: 0; animation: fadeUp 0.8s 1s cubic-bezier(.16,1,.3,1) forwards; }
.ticker-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 3px; color: var(--muted2); text-transform: uppercase; margin-bottom: 8px; }
.ticker-text { font-family: var(--font-mono); font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.5s; }
.ticker-text.fade { opacity: 0; }
.population-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 64px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; opacity: 0; animation: fadeUp 0.8s 0.7s cubic-bezier(.16,1,.3,1) forwards; }
.pop-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--ink2); }
.pop-number { font-family: var(--font-mono); font-size: clamp(36px, 5vw, 56px); font-weight: 600; color: var(--human); letter-spacing: -2px; line-height: 1; margin-bottom: 12px; }
.pop-sub { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.6; }
.pop-bar-wrap { display: flex; flex-direction: column; gap: 10px; }
.pop-bar-row { display: flex; align-items: center; gap: 12px; }
.pop-bar-label { font-size: 12px; color: var(--ink2); font-weight: 600; width: 80px; flex-shrink: 0; }
.pop-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.pop-bar-fill { height: 100%; border-radius: 99px; }
.pop-bar-val { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 40px; text-align: right; flex-shrink: 0; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes countUp { from{transform:translateY(4px);opacity:0} to{transform:translateY(0);opacity:1} }
.num-changed { animation: countUp 0.15s ease forwards; }
</style>
